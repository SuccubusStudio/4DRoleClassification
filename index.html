    <style>
        /* NieR: Automata Color Palette & Styling */
        :root {
            --nier-bg: #dad7c5;
            --nier-dark: #44423a;
            --nier-light: #e8e5d5;
            --nier-accent: #8b3434;
        }
        
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: var(--nier-bg); 
            color: var(--nier-dark); 
            font-family: 'Courier New', Courier, 'Segoe UI', Tahoma, monospace; 
        }
        
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #ui-layer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; 
            padding: 2rem; 
        }
        
        .nier-header-line {
            border-bottom: 2px solid var(--nier-dark);
            position: relative;
            margin-bottom: 0.5rem;
            padding-bottom: 0.5rem;
        }
        .nier-header-line::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: var(--nier-dark);
        }

        #target-bracket {
            position: absolute;
            pointer-events: none;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            opacity: 0;
            transition: opacity 0.2s, width 0.1s, height 0.1s;
            z-index: 90;
        }
        #target-bracket::before, #target-bracket::after {
            content: '';
            position: absolute;
            top: 0; bottom: 0;
            width: 12px;
            border: 2px solid var(--nier-dark);
        }
        #target-bracket::before {
            left: 0;
            border-right: none;
        }
        #target-bracket::after {
            right: 0;
            border-left: none;
        }

        /* 左側動態資料卡 (含頭像) */
        #tooltip {
            position: absolute;
            background: var(--nier-bg);
            border: 2px solid var(--nier-dark);
            color: var(--nier-dark);
            font-size: 14px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            transform: translate(calc(-100% - 45px), -50%); 
            z-index: 100;
            box-shadow: 4px 4px 0px rgba(68, 66, 58, 0.2);
            padding: 0;
            width: max-content;
            max-width: 350px; /* 限制寬度讓文字可以折行 */
        }

        #tooltip::before {
            content: '';
            position: absolute;
            right: -47px; 
            top: 50%;
            width: 45px;
            height: 2px;
            background-color: var(--nier-dark);
            transform: translateY(-50%);
        }

        .tooltip-header {
            background-color: var(--nier-dark);
            color: var(--nier-bg);
            padding: 6px 12px;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .tooltip-body {
            padding: 8px 12px;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--nier-bg);
        }

        /* 右側核心資料卡 (含大立繪) */
        #info-card {
            position: absolute;
            right: 40px;
            top: 50%;
            transform: translateY(-50%) translateX(30px);
            width: 320px;
            background: rgba(218, 215, 197, 0.95);
            border: 2px solid var(--nier-dark);
            color: var(--nier-dark);
            padding: 16px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 6px 6px 0px rgba(68, 66, 58, 0.2);
            z-index: 100;
        }
        #info-card.active {
            opacity: 1;
            transform: translateY(-50%) translateX(0);
        }
        #info-card::before {
            content: '>';
            position: absolute;
            left: -15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--nier-dark);
            font-weight: bold;
            font-size: 20px;
        }

        #back-btn {
            pointer-events: auto;
            background-color: var(--nier-bg);
            color: var(--nier-dark);
            border: 2px solid var(--nier-dark);
            transition: all 0.1s;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            letter-spacing: 2px;
            box-shadow: 4px 4px 0px rgba(68, 66, 58, 0.2);
        }
        #back-btn:hover {
            background-color: var(--nier-dark);
            color: var(--nier-bg);
            transform: translate(-50%, -2px);
            box-shadow: 4px 6px 0px rgba(68, 66, 58, 0.4);
        }
        
        .axis-label {
            font-weight: bold;
            letter-spacing: 2px;
            font-family: 'Courier New', Courier, monospace;
        }

        .scanlines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%;
            z-index: 5;
            pointer-events: none;
            opacity: 0.6;
        }

        /* 圖片容器共用掃描線效果 */
        .img-scanline-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            pointer-events: none;
        }

            "隨心且混亂的高冷少御": "行事全憑心情的狂氣藝術家，為了靈感不惜破壞一切。",
            "隨心且混亂的元氣御姐": "喜怒無常的享樂主義者，所有的行動都只為了取悅自己。",
            "隨心且混亂的沉穩御姐": "把世界當作棋盤的神秘賭徒，享受著不可預測的混亂局勢。",
            "隨心且混亂的高冷御姐": "不受任何道德綁架的瘋狂科學家，為了實驗可以無視倫理。",

            // ------------------------------------------
            // 【4D EXPAND】邪惡陣營 (W = 邪惡)
            // ------------------------------------------
            "邪惡且守序的元氣少女": "笑瞇瞇地執行死刑的劊子手，對組織的命令絕對服從。",
            "邪惡且守序的沉穩少女": "面不改色下毒的冷血女僕，嚴格執行主人的每一項暗殺指令。",
            "邪惡且守序的高冷少女": "高傲的貴族千金，視平民為螻蟻，冷酷地維持階級制度。",
            "邪惡且守序的元氣少御": "對邪惡組織絕對忠誠的狂熱幹部，用陽光的態度執行殘酷任務。",
            "邪惡且守序的沉穩少御": "精心策劃陰謀的冷酷秘書，透過合法漏洞榨乾對手。",
            "邪惡且守序的高冷少御": "沒有感情的殺人機器，如同精密齒輪般執行清除任務。",
            "邪惡且守序的元氣御姐": "用親切笑容壓榨員工的黑心老闆，制定嚴苛的奴隸條款。",
            "邪惡且守序的沉穩御姐": "制定嚴酷法律的獨裁女王，用高壓統治維持帝國的絕對秩序。",
            "邪惡且守序的高冷御姐": "冷酷無情的魔王軍統帥，戰術精準且毫不留情。",

            "邪惡且不羈的元氣少御": "為了錢什麼都做的開朗傭兵，笑著接下屠殺無辜者的委託。",
            "邪惡且不羈的沉穩少御": "為利益背叛一切的雙面間諜，在各方勢力間遊走並引發戰火。",
            "邪惡且不羈的高冷少御": "冷眼看人溺水的見死不救者，甚至會為了樂趣踩上一腳。",

            "邪惡且不羈的沉穩御姐": "優雅地吸食人血的吸血鬼貴族，將人類視為低等的食物。",
            "邪惡且不羈的高冷御姐": "為了永保青春不擇手段的女巫，冷漠地奪走他人的生命力。",
            "邪惡且混亂的元氣少女": "炸毀一切只為聽響聲的瘋丫頭，所到之處皆為廢墟。",
            "邪惡且混亂的沉穩少女": "她會笑著看你的世界燃燒，純粹為了好玩。",
            "邪惡且混亂的高冷少女": "以折磨人為樂的傲慢惡魔，看著凡人受苦是她唯一的消遣。",
            "邪惡且混亂的元氣少御": "熱衷於製造混亂與恐慌的小丑，用笑聲掩蓋著極度的殘忍。",
            "邪惡且混亂的沉穩少御": "冷靜佈下連環致命陷阱的變態殺手，將受害者的恐懼視為藝術品。",
            "邪惡且混亂的高冷少御": "厭惡一切存在，企圖歸零世界的虛無主義者，所過之處生機全無。",
            "邪惡且混亂的元氣御姐": "沉醉於破壞與鮮血的狂戰士，在殺戮中尋求極致的愉悅。",
            "邪惡且混亂的沉穩御姐": "面無表情地引發世界末日的邪神，將毀滅視為理所當然的日常。",
            "邪惡且混亂的高冷御姐": "毫無理由就降下天災的殘酷魔神，單純因為心情不好就毀滅整個國家。"
        };

        const NIER_BG = 0xdad7c5;
        const NIER_DARK = 0x44423a;
        const NIER_LIGHT = 0xe8e5d5;
        const NIER_LINES = 0x8a8779;
        const NIER_ACCENT = 0x8b3434;

        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(NIER_BG);
        scene.fog = new THREE.FogExp2(NIER_BG, 0.025);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(15, 12, 20); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 3, 0); 

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        const backLight = new THREE.DirectionalLight(0xffffff, 0.3);
        backLight.position.set(-10, -10, -10);
        scene.add(backLight);

        const dimX = [
            { id: -1, name: '元氣' }, { id: 0, name: '沉穩' }, { id: 1, name: '高冷' }
        ];
        const dimY = [
            { id: 0, name: '少女', size: 0.4 },
            { id: 1, name: '少御', size: 0.5 },
            { id: 2, name: '御姐', size: 0.6 }
        ];
        const dimZ = [
            { id: -1, name: '守序' },
            { id: 0, name: '不羈' },
            { id: 1, name: '混亂' }
        ];
        const dimW = [
            { id: 1, name: '正義' },
            { id: 2, name: '隨心' },
            { id: 3, name: '邪惡' }
        ];

        const spacing = 4;
        const nodeMeshes = [];
        const gridLines = []; 
        
        const mainGridGroup = new THREE.Group();
        scene.add(mainGridGroup);

        const sphereGeo = new THREE.SphereGeometry(1, 16, 16); 
        
        // 建立 3D 基礎節點
        dimX.forEach(x => {
            dimY.forEach(y => {
                dimZ.forEach(z => {
                    const posX = x.id * spacing;
                    const posY = y.id * spacing;
                    const posZ = z.id * spacing;

                    const material = new THREE.MeshStandardMaterial({ 
                        color: 0xa8a493, metalness: 0.1, roughness: 0.9, transparent: true, opacity: 1.0
                    });
                    
                    const sphere = new THREE.Mesh(sphereGeo, material);
                    sphere.scale.setScalar(y.size); 
                    sphere.position.set(posX, posY, posZ);
                    
                    const dataKey = `${z.name}的${x.name}${y.name}`;
                    const customDesc = characterDB[dataKey] || "???";

                    const randomW = dimW[Math.floor(Math.random() * dimW.length)].name;
                    const imageFilename = `${randomW}${z.name}${x.name}${y.name}.webp`;

                    const charName = dataKey; 
                    const wHintTag = `<span class="w-hint" style="color: #8b3434; font-size: 11px; font-weight:bold; display:block; margin-top:8px;">▶ CLICK TO EXPAND W-AXIS</span>`;
                    
                    const charDesc = `
                        <div style="font-family:'Courier New'; font-size:12px; border-bottom:1px solid #44423a; margin-bottom:4px; padding-bottom:2px;">[ DATA_KEY: ${dataKey} ]</div>
                        <div style="line-height: 1.5; margin-top: 6px;">${customDesc}</div>
                        ${wHintTag}
                    `;
                    
                    sphere.userData = {
                        name: charName, 
                        baseName: charName, 
                        desc: charDesc,
                        imageFilename: imageFilename, 
                        xName: x.name, 
                        yName: y.name,
                        zName: z.name,
                        ix: x.id, iy: y.id, iz: z.id,
                        originalScale: y.size, originalColor: 0xa8a493, hoverColor: NIER_DARK
                    };

                    mainGridGroup.add(sphere);
                    nodeMeshes.push(sphere);
                });
            });
        });

        const lineMaterial = new THREE.LineBasicMaterial({ color: NIER_LINES, transparent: true, opacity: 0.4 });
        for (let i = 0; i < nodeMeshes.length; i++) {
            for (let j = i + 1; j < nodeMeshes.length; j++) {
                const n1 = nodeMeshes[i].userData;
                const n2 = nodeMeshes[j].userData;
                const dist = Math.abs(n1.ix - n2.ix) + Math.abs(n1.iy - n2.iy) + Math.abs(n1.iz - n2.iz);
                if (dist === 1) {
                    const points = [nodeMeshes[i].position, nodeMeshes[j].position];
                    const geometry = new THREE.BufferGeometry().setFromPoints(points);
                    const line = new THREE.Line(geometry, lineMaterial);
                    mainGridGroup.add(line);
                    gridLines.push(line);
                }
            }
        }

        const axesHelper = new THREE.AxesHelper(10);
        axesHelper.setColors(new THREE.Color(NIER_DARK), new THREE.Color(NIER_DARK), new THREE.Color(NIER_DARK));
        mainGridGroup.add(axesHelper);

        let is4DMode = false;
        let activeCenterMesh = null;
        let active4DGroup = null;
        let targetGridOpacity = 1.0;
        let currentGridOpacity = 1.0;
        let active4DNodes = [];

        let isCameraTransitioning = false;
        let cameraTargetStart = new THREE.Vector3();
        let cameraTargetEnd = new THREE.Vector3();
        let cameraPosStart = new THREE.Vector3();
        let cameraPosEnd = new THREE.Vector3();
        let transitionProgress = 0;
        const transitionSpeed = 0.05;

        const backBtn = document.getElementById('back-btn');
        const legendBox = document.getElementById('legend-box');
        const axisLabels = document.getElementById('axis-labels');
        const infoCard = document.getElementById('info-card');
        const infoCardTitle = document.getElementById('info-card-title');
        const infoCardContent = document.getElementById('info-card-content');
        
        // --- 圖片自動偵測比例邏輯 ---
        const infoCardImg = document.getElementById('info-card-img');
        const ttImg = document.getElementById('tt-img');

        const autoAdjustRatio = function() {
            if (this.naturalWidth && this.naturalHeight) {
                this.parentElement.style.aspectRatio = `${this.naturalWidth} / ${this.naturalHeight}`;
            } else {
                this.parentElement.style.aspectRatio = '1 / 1';
            }
        };

        // 綁定載入事件以自動調整比例
        infoCardImg.onload = autoAdjustRatio;
        ttImg.onload = autoAdjustRatio;

        function enter4DMode(baseMesh) {
            is4DMode = true;
            activeCenterMesh = baseMesh;
            targetGridOpacity = 0.15; 
            
            backBtn.classList.remove('opacity-0', 'pointer-events-none');
            legendBox.style.opacity = '0';
            axisLabels.style.opacity = '0';

            infoCardTitle.innerHTML = `[ ${baseMesh.userData.baseName} ]`;
            let cleanDesc = baseMesh.userData.desc.replace(/<span class="w-hint"[\s\S]*?<\/span>/g, '');
            infoCardContent.innerHTML = cleanDesc;
            
            // 載入右側大卡片的立繪圖片
            infoCardImg.onerror = function() { this.onerror = null; this.src = window.fallbackSVG; };
            infoCardImg.src = baseMesh.userData.imageFilename;
            
            infoCard.classList.add('active'); 

            active4DGroup = new THREE.Group();
            active4DGroup.position.copy(baseMesh.position); 
            scene.add(active4DGroup);

            const dir = new THREE.Vector3(-1, 0.3, 0.5).normalize();
            const wSpacing = 4; 
            
            const points = [
                new THREE.Vector3(0, 0, 0),
                dir.clone().multiplyScalar(wSpacing * 3)
            ];
            const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
            const lineMat = new THREE.LineBasicMaterial({ color: NIER_DARK, transparent: true, opacity: 0.6 });
            const wAxisLine = new THREE.Line(lineGeo, lineMat);
            active4DGroup.add(wAxisLine);

            const octaGeo = new THREE.OctahedronGeometry(0.8, 0);
            active4DNodes = [];

            dimW.forEach(w => {
                const pos = dir.clone().multiplyScalar(w.id * wSpacing);
                
                const wMat = new THREE.MeshStandardMaterial({
                    color: NIER_LIGHT, metalness: 0.0, roughness: 1.0, transparent: true, opacity: 1.0
                });
                
                const wNode = new THREE.Mesh(octaGeo, wMat);
                wNode.position.copy(pos);
                
                const dataKey4D = `${w.name}且${baseMesh.userData.baseName}`;
                const customDesc4D = characterDB[dataKey4D] || "???";

                const imageFilename4D = `${w.name}${baseMesh.userData.zName}${baseMesh.userData.xName}${baseMesh.userData.yName}.webp`;

                wNode.userData = {
                    name: dataKey4D, 
                    desc: `
                        <div style="font-family:'Courier New'; font-size:12px; border-bottom:1px solid #44423a; margin-bottom:4px; padding-bottom:2px;">[ DATA_KEY: ${dataKey4D} ]</div>
                        <div style="line-height: 1.5; margin-top: 6px;">${customDesc4D}</div>
                    `,
                    imageFilename: imageFilename4D,
                    originalScale: 1.0, originalColor: NIER_LIGHT, hoverColor: 0xffffff, is4DNode: true
                };
                
                active4DGroup.add(wNode);
                active4DNodes.push(wNode);
            });

            active4DGroup.scale.set(0.001, 0.001, 0.001);

            isCameraTransitioning = true;
            transitionProgress = 0;
            cameraTargetStart.copy(controls.target);
            cameraPosStart.copy(camera.position);
            cameraTargetEnd.copy(baseMesh.position);
            
            const camDir = new THREE.Vector3().subVectors(camera.position, controls.target).normalize();
            const focusDistance = 15; 
            cameraPosEnd.copy(baseMesh.position).add(camDir.multiplyScalar(focusDistance));
            
            controls.enableDamping = false;
        }

        function exit4DMode() {
            is4DMode = false;
            activeCenterMesh = null;
            targetGridOpacity = 1.0;
            
            backBtn.classList.add('opacity-0', 'pointer-events-none');
            legendBox.style.opacity = '1';
            axisLabels.style.opacity = '1';
            infoCard.classList.remove('active'); 

            if (active4DGroup) {
                scene.remove(active4DGroup);
                active4DGroup = null;
                active4DNodes = [];
            }
            
            isCameraTransitioning = true;
            transitionProgress = 0;
            cameraTargetStart.copy(controls.target);
            cameraPosStart.copy(camera.position);
            cameraTargetEnd.set(0, 3, 0);
            
            const camDir = new THREE.Vector3().subVectors(camera.position, controls.target).normalize();
            const overviewDistance = 28; 
            cameraPosEnd.copy(new THREE.Vector3(0,3,0)).add(camDir.multiplyScalar(overviewDistance));

            if(cameraPosEnd.y < 5) cameraPosEnd.y = 12;

            controls.enableDamping = false;
        }

        backBtn.addEventListener('click', exit4DMode);

        window.addEventListener('keydown', (event) => {
            if (event.code === 'Space' && is4DMode && !isCameraTransitioning) {
                exit4DMode();
            }
        });

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2(-999, -999); 
        const tooltip = document.getElementById('tooltip');
        const ttTitle = document.getElementById('tt-title');
        const ttDesc = document.getElementById('tt-desc');
        const targetBracket = document.getElementById('target-bracket');
        
        let autoFocusedMesh = null;
        const tempProjVec = new THREE.Vector3();

        window.addEventListener('mousemove', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        });

        window.addEventListener('click', (event) => {
            if(event.target.closest('#back-btn')) return;
            
            raycaster.setFromCamera(mouse, camera);
            
            const intersectTargets = is4DMode ? [...active4DNodes, activeCenterMesh] : nodeMeshes;
            const intersects = raycaster.intersectObjects(intersectTargets);

            if (intersects.length > 0) {
                const clickedMesh = intersects[0].object;
                if (!is4DMode && !isCameraTransitioning) {
                    enter4DMode(clickedMesh);
                }
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);

            if (isCameraTransitioning) {
                transitionProgress += transitionSpeed;
                const t = Math.min(1.0, transitionProgress);
                const easeT = t * t * (3 - 2 * t);
                controls.target.lerpVectors(cameraTargetStart, cameraTargetEnd, easeT);
                camera.position.lerpVectors(cameraPosStart, cameraPosEnd, easeT);
                if (transitionProgress >= 1.0) {
                    isCameraTransitioning = false;
                    controls.enableDamping = true; 
                }
            }
            controls.update();

            if (!isCameraTransitioning) {
                let currentHover = null;
                const targets = is4DMode ? [...active4DNodes, activeCenterMesh] : nodeMeshes;
                
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(targets);

                if (intersects.length > 0) {
                    currentHover = intersects[0].object;
                }

                if (autoFocusedMesh !== currentHover) {
                    if (autoFocusedMesh) {
                        autoFocusedMesh.scale.setScalar(autoFocusedMesh.userData.originalScale);
                    }
                    
                    autoFocusedMesh = currentHover;
                    
                    if (autoFocusedMesh) {
                        autoFocusedMesh.scale.setScalar(autoFocusedMesh.userData.originalScale * 1.3);
                        
                        ttTitle.innerHTML = autoFocusedMesh.userData.name;
                        ttDesc.innerHTML = autoFocusedMesh.userData.desc;
                        
                        ttImg.onerror = function() { this.onerror = null; this.src = window.fallbackSVG; };
                        ttImg.src = autoFocusedMesh.userData.imageFilename;
                        
                        const ttImgContainer = document.getElementById('tt-img-container');

                        if (autoFocusedMesh.userData.is4DNode) {
                            ttTitle.style.backgroundColor = '#e8e5d5';
                            ttTitle.style.color = '#44423a';
                            // 移除寫死的高度 h-40，保留寬度 w-40，讓 aspect-ratio 自動調整高度
                            ttImgContainer.className = "w-40 flex-shrink-0 border-2 border-[var(--nier-dark)] bg-[var(--nier-light)] relative overflow-hidden transition-all duration-200";
                        } else {
                            ttTitle.style.backgroundColor = '#44423a';
                            ttTitle.style.color = '#dad7c5';
                            // 移除寫死的高度 h-16，保留寬度 w-16，讓 aspect-ratio 自動調整高度
                            ttImgContainer.className = "w-16 flex-shrink-0 border-2 border-[var(--nier-dark)] bg-[var(--nier-light)] relative overflow-hidden transition-all duration-200";
                        }
                    }
                }

                if (autoFocusedMesh) {
                    autoFocusedMesh.getWorldPosition(tempProjVec);
                    tempProjVec.project(camera);
                    
                    const x = (tempProjVec.x * 0.5 + 0.5) * window.innerWidth;
                    const y = (tempProjVec.y * -0.5 + 0.5) * window.innerHeight;

                    targetBracket.style.left = x + 'px';
                    targetBracket.style.top = y + 'px';
                    targetBracket.style.opacity = 1;

                    tooltip.style.left = x + 'px';
                    tooltip.style.top = y + 'px';
                    tooltip.style.opacity = 1;
                } else {
                    targetBracket.style.opacity = 0;
                    tooltip.style.opacity = 0;
                }
            } else {
                targetBracket.style.opacity = 0;
                tooltip.style.opacity = 0;
            }

            if (is4DMode) {
                targetGridOpacity = 0.15;
            } else if (autoFocusedMesh && !isCameraTransitioning) {
                targetGridOpacity = 0.25; 
            } else {
                targetGridOpacity = 1.0;
            }

            currentGridOpacity += (targetGridOpacity - currentGridOpacity) * 0.15;

            nodeMeshes.forEach(mesh => {
                if (is4DMode) {
                    if (mesh === activeCenterMesh) {
                        mesh.material.opacity = 1.0;
                        mesh.material.color.setHex(NIER_DARK); 
                    } else {
                        mesh.material.opacity = currentGridOpacity;
                        mesh.material.color.setHex(mesh.userData.originalColor);
                    }
                } else {
                    if (mesh === autoFocusedMesh) {
                        mesh.material.opacity = 1.0;
                        mesh.material.color.setHex(mesh.userData.hoverColor);
                    } else {
                        mesh.material.opacity = currentGridOpacity;
                        mesh.material.color.setHex(mesh.userData.originalColor);
                    }
                }
            });

            gridLines.forEach(line => { line.material.opacity = currentGridOpacity * 0.4; });
            axesHelper.material.opacity = currentGridOpacity;
            axesHelper.transparent = true;

            if (is4DMode && active4DGroup) {
                active4DGroup.scale.lerp(new THREE.Vector3(1, 1, 1), 0.15);
                active4DNodes.forEach(node => {
                    node.rotation.y += 0.01;
                    node.rotation.z += 0.005;
                    
                    if (node === autoFocusedMesh) {
                        node.material.color.setHex(node.userData.hoverColor);
                        node.material.opacity = 1.0;
                    } else {
                        node.material.color.setHex(node.userData.originalColor);
                        node.material.opacity = 0.8;
                    }
                });
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
