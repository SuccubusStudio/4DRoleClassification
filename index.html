    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        /* NieR: Automata Color Palette & Styling */
        :root {
            --nier-bg: #dad7c5;
            --nier-dark: #44423a;
            --nier-light: #e8e5d5;
            --nier-accent: #8b3434;
        }
        
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: var(--nier-bg); 
            color: var(--nier-dark); 
            font-family: 'Courier New', Courier, 'Segoe UI', Tahoma, monospace; 
        }
        
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #ui-layer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; 
            padding: 2rem; 
        }
        
        .nier-header-line {
            border-bottom: 2px solid var(--nier-dark);
            position: relative;
            margin-bottom: 0.5rem;
            padding-bottom: 0.5rem;
        }
        .nier-header-line::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: var(--nier-dark);
        }

        #target-bracket {
            position: absolute;
            pointer-events: none;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            opacity: 0;
            transition: opacity 0.2s, width 0.1s, height 0.1s;
            z-index: 90;
        }
        #target-bracket::before, #target-bracket::after {
            content: '';
            position: absolute;
            top: 0; bottom: 0;
            width: 12px;
            border: 2px solid var(--nier-dark);
        }
        #target-bracket::before {
            left: 0;
            border-right: none;
        }
        #target-bracket::after {
            right: 0;
            border-left: none;
        }

        /* 左側動態資料卡 (含頭像) - 移除寫死的 Transform 讓 JS 動態控制 */
        #tooltip {
            position: absolute;
            background: var(--nier-bg);
            border: 2px solid var(--nier-dark);
            color: var(--nier-dark);
            font-size: 14px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s; 
            z-index: 100;
            box-shadow: 4px 4px 0px rgba(68, 66, 58, 0.2);
            padding: 0;
            width: max-content;
            max-width: 350px;
        }

        /* 智慧定位狀態 Class (由 JS 動態切換) */
        #tooltip.pos-left { transform: translate(calc(-100% - 45px), -50%); }
        #tooltip.pos-left::before {
            content: ''; position: absolute; right: -47px; top: 50%;
            width: 45px; height: 2px; background-color: var(--nier-dark); transform: translateY(-50%);
        }

        #tooltip.pos-right { transform: translate(45px, -50%); }
        #tooltip.pos-right::before {
            content: ''; position: absolute; left: -47px; top: 50%;
            width: 45px; height: 2px; background-color: var(--nier-dark); transform: translateY(-50%);
        }

        #tooltip.pos-top { transform: translate(-50%, calc(-100% - 45px)); }
        #tooltip.pos-top::before {
            content: ''; position: absolute; left: 50%; bottom: -47px;
            width: 2px; height: 45px; background-color: var(--nier-dark); transform: translateX(-50%);
        }

        #tooltip.pos-bottom { transform: translate(-50%, 45px); }
        #tooltip.pos-bottom::before {
            content: ''; position: absolute; left: 50%; top: -47px;
            width: 2px; height: 45px; background-color: var(--nier-dark); transform: translateX(-50%);
        }

        .tooltip-header {
            background-color: var(--nier-dark);
            color: var(--nier-bg);
            padding: 6px 12px;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .tooltip-body {
            padding: 8px 12px;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--nier-bg);
        }

        /* 右側核心資料卡 (含大立繪) */
        #info-card {
            position: absolute;
            right: 40px;
            top: 50%;
            transform: translateY(-50%) translateX(30px);
            width: 320px;
            background: rgba(218, 215, 197, 0.95);
            border: 2px solid var(--nier-dark);
            color: var(--nier-dark);
            padding: 16px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 6px 6px 0px rgba(68, 66, 58, 0.2);
            z-index: 100;
        }
        #info-card.active {
            opacity: 1;
            transform: translateY(-50%) translateX(0);
        }
        #info-card::before {
            content: '>';
            position: absolute;
            left: -15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--nier-dark);
            font-weight: bold;
            font-size: 20px;
        }

        #back-btn {
            pointer-events: auto;
            background-color: var(--nier-bg);
            color: var(--nier-dark);
            border: 2px solid var(--nier-dark);
            transition: all 0.1s;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            letter-spacing: 2px;
            box-shadow: 4px 4px 0px rgba(68, 66, 58, 0.2);
        }
        #back-btn:hover {
            background-color: var(--nier-dark);
            color: var(--nier-bg);
            transform: translate(-50%, -2px);
            box-shadow: 4px 6px 0px rgba(68, 66, 58, 0.4);
        }
        
        .axis-label {
            font-weight: bold;
            letter-spacing: 2px;
            font-family: 'Courier New', Courier, monospace;
        }

        .scanlines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%;
            z-index: 5;
            pointer-events: none;
            opacity: 0.6;
        }

        /* 圖片容器共用掃描線效果 */
        .img-scanline-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            pointer-events: none;
        }

        /* 稱號樣式強化 */
        .char-title-text {
            display: block;
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--nier-accent);
            margin-bottom: 0.25rem;
            letter-spacing: 1px;
            border-left: 4px solid var(--nier-accent);
            padding-left: 8px;
        }
    </style>

        function createTextTexture(text) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const fontSize = 80;
            // 使用 Google Font 毛筆書法字體，並設定系統內建楷體為備案
            const fontStack = `${fontSize}px 'Ma Shan Zheng', 'BiauKai', 'DFKai-SB', 'KaiTi', 'STKaiti', serif`;
            ctx.font = fontStack;
            const textWidth = ctx.measureText(text).width;
            canvas.width = textWidth + 40;
            canvas.height = fontSize + 40;
            
            ctx.font = fontStack;
            ctx.fillStyle = '#44423a'; // 使用系統主色 NIER_DARK
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.minFilter = THREE.LinearFilter;
            return { texture, aspect: canvas.width / canvas.height };
        }

        // 建立平貼於地面的道路標線 (X軸、Z軸用)
        function createGroundLabel(text, pos, rotZ = 0) {
            const { texture, aspect } = createTextTexture(text);
            const material = new THREE.MeshBasicMaterial({ map: texture, transparent: true, opacity: 0.25, depthWrite: false });
            const geometry = new THREE.PlaneGeometry(3.5 * aspect, 3.5);
            const plane = new THREE.Mesh(geometry, material);
            plane.position.copy(pos);
            plane.rotation.x = -Math.PI / 2; // 平貼地面
            plane.rotation.z = rotZ;         // 根據軸向旋轉文字
            axisLabels3D.push(material);
            return plane;
        }

            sprite.scale.set(3.5 * aspect, 3.5, 1);
            sprite.position.copy(pos);
            axisLabels3D.push(material);
            return sprite;

            ];
            const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
            const lineMat = new THREE.LineBasicMaterial({ color: NIER_DARK, transparent: true, opacity: 0.6 });
            const wAxisLine = new THREE.Line(lineGeo, lineMat);
            active4DGroup.add(wAxisLine);

            const octaGeo = new THREE.OctahedronGeometry(0.8, 0);
            active4DNodes = [];

            dimW.forEach(w => {
                const pos = dir.clone().multiplyScalar(w.id * wSpacing);
                
                const wMat = new THREE.MeshStandardMaterial({
                    color: NIER_LIGHT, metalness: 0.0, roughness: 1.0, transparent: true, opacity: 1.0
                });
                
                const wNode = new THREE.Mesh(octaGeo, wMat);
                wNode.position.copy(pos);
                
                const dataKey4D = `${w.name}且${baseMesh.userData.baseName}`;
                const dataObj4D = characterDB[dataKey4D] || { title: "未知異變", desc: "數據超出範圍。" };

                const imageFilename4D = `${w.name}${baseMesh.userData.zName}${baseMesh.userData.xName}${baseMesh.userData.yName}.webp`;

                wNode.userData = {
                    name: dataKey4D, 
                    desc: `
                        <div style="font-family:'Courier New'; font-size:12px; border-bottom:1px solid #44423a; margin-bottom:8px; padding-bottom:2px;">[ DATA_KEY: ${dataKey4D} ]</div>
                        <span class="char-title-text">${dataObj4D.title}</span>
                        <div style="line-height: 1.5; margin-top: 4px;">${dataObj4D.desc}</div>
                    `,
                    imageFilename: imageFilename4D,
                    originalScale: 1.0, originalColor: NIER_LIGHT, hoverColor: 0xffffff, is4DNode: true
                };
                
                active4DGroup.add(wNode);
                active4DNodes.push(wNode);
            });

            active4DGroup.scale.set(0.001, 0.001, 0.001);

            isCameraTransitioning = true;
            transitionProgress = 0;
            cameraTargetStart.copy(controls.target);
            cameraPosStart.copy(camera.position);
            cameraTargetEnd.copy(baseMesh.position);
            
            const camDir = new THREE.Vector3().subVectors(camera.position, controls.target).normalize();
            const focusDistance = 15; 
            cameraPosEnd.copy(baseMesh.position).add(camDir.multiplyScalar(focusDistance));
            
            controls.enableDamping = false;
        }

        function exit4DMode() {
            is4DMode = false;
            activeCenterMesh = null;
            targetGridOpacity = 1.0;
            
            backBtn.classList.add('opacity-0', 'pointer-events-none');
            legendBox.style.opacity = '1';
            axisLabels.style.opacity = '1';
            infoCard.classList.remove('active'); 

            if (active4DGroup) {
                scene.remove(active4DGroup);
                active4DGroup = null;
                active4DNodes = [];
            }
            
            isCameraTransitioning = true;
            transitionProgress = 0;
            cameraTargetStart.copy(controls.target);
            cameraPosStart.copy(camera.position);
            cameraTargetEnd.set(0, 3, 0);
            
            const camDir = new THREE.Vector3().subVectors(camera.position, controls.target).normalize();
            const overviewDistance = 28; 
            cameraPosEnd.copy(new THREE.Vector3(0,3,0)).add(camDir.multiplyScalar(overviewDistance));

            if(cameraPosEnd.y < 5) cameraPosEnd.y = 12;

            controls.enableDamping = false;
        }

        backBtn.addEventListener('click', exit4DMode);

        window.addEventListener('keydown', (event) => {
            if (event.code === 'Space' && is4DMode && !isCameraTransitioning) {
                exit4DMode();
            }
        });

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2(-999, -999); 
        const tooltip = document.getElementById('tooltip');
        const ttTitle = document.getElementById('tt-title');
        const ttDesc = document.getElementById('tt-desc');
        const targetBracket = document.getElementById('target-bracket');
        
        let autoFocusedMesh = null;
        const tempProjVec = new THREE.Vector3();

        // 用來快取 tooltip 尺寸，避免在 requestAnimationFrame 中頻繁強制重繪
        let cachedTooltipWidth = 250;
        let cachedTooltipHeight = 100;
        let currentTooltipPosClass = '';

        window.addEventListener('mousemove', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        });

        window.addEventListener('click', (event) => {
            if(event.target.closest('#back-btn')) return;
            
            raycaster.setFromCamera(mouse, camera);
            
            const intersectTargets = is4DMode ? [...active4DNodes, activeCenterMesh] : nodeMeshes;
            const intersects = raycaster.intersectObjects(intersectTargets);

            if (intersects.length > 0) {
                const clickedMesh = intersects[0].object;
                if (!is4DMode && !isCameraTransitioning) {
                    enter4DMode(clickedMesh);
                }
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);

            if (isCameraTransitioning) {
                transitionProgress += transitionSpeed;
                const t = Math.min(1.0, transitionProgress);
                const easeT = t * t * (3 - 2 * t);
                controls.target.lerpVectors(cameraTargetStart, cameraTargetEnd, easeT);
                camera.position.lerpVectors(cameraPosStart, cameraPosEnd, easeT);
                if (transitionProgress >= 1.0) {
                    isCameraTransitioning = false;
                    controls.enableDamping = true; 
                }
            }
            controls.update();

            if (!isCameraTransitioning) {
                let currentHover = null;
                const targets = is4DMode ? [...active4DNodes, activeCenterMesh] : nodeMeshes;
                
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(targets);

                if (intersects.length > 0) {
                    currentHover = intersects[0].object;
                }

                // 當選中目標切換時更新資料
                if (autoFocusedMesh !== currentHover) {
                    if (autoFocusedMesh) {
                        autoFocusedMesh.scale.setScalar(autoFocusedMesh.userData.originalScale);
                    }
                    
                    autoFocusedMesh = currentHover;
                    
                    if (autoFocusedMesh) {
                        autoFocusedMesh.scale.setScalar(autoFocusedMesh.userData.originalScale * 1.3);
                        
                        ttTitle.innerHTML = autoFocusedMesh.userData.name;
                        ttDesc.innerHTML = autoFocusedMesh.userData.desc;
                        
                        ttImg.onerror = function() { this.onerror = null; this.src = window.fallbackSVG; };
                        ttImg.src = autoFocusedMesh.userData.imageFilename;
                        
                        const ttImgContainer = document.getElementById('tt-img-container');

                        if (autoFocusedMesh.userData.is4DNode) {
                            ttTitle.style.backgroundColor = '#e8e5d5';
                            ttTitle.style.color = '#44423a';
                            ttImgContainer.className = "w-40 flex-shrink-0 border-2 border-[var(--nier-dark)] bg-[var(--nier-light)] relative overflow-hidden transition-all duration-200";
                        } else {
                            ttTitle.style.backgroundColor = '#44423a';
                            ttTitle.style.color = '#dad7c5';
                            ttImgContainer.className = "w-16 flex-shrink-0 border-2 border-[var(--nier-dark)] bg-[var(--nier-light)] relative overflow-hidden transition-all duration-200";
                        }

                        // 強制讀取一次寬高來快取，以防不同卡片大小不一
                        setTimeout(() => {
                            cachedTooltipWidth = tooltip.offsetWidth;
                            cachedTooltipHeight = tooltip.offsetHeight;
                        }, 0);
                    }
                }

                // 計算並追蹤目標 2D 螢幕座標
                if (autoFocusedMesh) {
                    autoFocusedMesh.getWorldPosition(tempProjVec);
                    tempProjVec.project(camera);
                    
                    const x = (tempProjVec.x * 0.5 + 0.5) * window.innerWidth;
                    const y = (tempProjVec.y * -0.5 + 0.5) * window.innerHeight;

                    targetBracket.style.left = x + 'px';
                    targetBracket.style.top = y + 'px';
                    targetBracket.style.opacity = 1;

                    tooltip.style.left = x + 'px';
                    tooltip.style.top = y + 'px';
                    tooltip.style.opacity = 1;

                    // =====================================
                    // 🔥 SMART POSITIONING LOGIC (智慧方向偵測)
                    // =====================================
                    const offset = 45; // 連接線的長度預留
                    const padding = 20; // 視窗安全邊距
                    
                    // 如果在 4D 模式，右側 360px 是給 Core Info Card 使用的，需排除
                    const safeRightBoundary = is4DMode ? (window.innerWidth - 360) : window.innerWidth;

                    let newPosClass = 'pos-right'; // 預設優先朝右

                    // 順序：右側夠放 -> 左側夠放 -> 上方夠放 -> 下方
                    if (x + offset + cachedTooltipWidth + padding < safeRightBoundary) {
                        newPosClass = 'pos-right';
                    } else if (x - offset - cachedTooltipWidth - padding > 0) {
                        newPosClass = 'pos-left';
                    } else if (y - offset - cachedTooltipHeight - padding > 0) {
                        newPosClass = 'pos-top';
                    } else {
                        newPosClass = 'pos-bottom';
                    }

                    // 只有在方向改變時才更新 class，避免不必要的 DOM 寫入
                    if (currentTooltipPosClass !== newPosClass) {
                        if (currentTooltipPosClass) tooltip.classList.remove(currentTooltipPosClass);
                        tooltip.classList.add(newPosClass);
                        currentTooltipPosClass = newPosClass;
                    }

                } else {
                    targetBracket.style.opacity = 0;
                    tooltip.style.opacity = 0;
                }
            } else {
                targetBracket.style.opacity = 0;
                tooltip.style.opacity = 0;
            }

            // 處理畫面透明度過濾效果
            if (is4DMode) {
                targetGridOpacity = 0.15;
            } else if (autoFocusedMesh && !isCameraTransitioning) {
                targetGridOpacity = 0.25; 
            } else {
                targetGridOpacity = 1.0;
            }

            currentGridOpacity += (targetGridOpacity - currentGridOpacity) * 0.15;

            nodeMeshes.forEach(mesh => {
                if (is4DMode) {
                    if (mesh === activeCenterMesh) {
                        mesh.material.opacity = 1.0;
                        mesh.material.color.setHex(NIER_DARK); 
                    } else {
                        mesh.material.opacity = currentGridOpacity;
                        mesh.material.color.setHex(mesh.userData.originalColor);
                    }
                } else {
                    if (mesh === autoFocusedMesh) {
                        mesh.material.opacity = 1.0;
                        mesh.material.color.setHex(mesh.userData.hoverColor);
                    } else {
                        mesh.material.opacity = currentGridOpacity;
                        mesh.material.color.setHex(mesh.userData.originalColor);
                    }
                }
            });

            gridLines.forEach(line => { line.material.opacity = currentGridOpacity * 0.4; });
            mainAxisLines.forEach(line => { line.material.opacity = currentGridOpacity * 0.4; });
            axisLabels3D.forEach(mat => { mat.opacity = currentGridOpacity * 0.25; });

            if (is4DMode && active4DGroup) {
                active4DGroup.scale.lerp(new THREE.Vector3(1, 1, 1), 0.15);
                active4DNodes.forEach(node => {
                    node.rotation.y += 0.01;
                    node.rotation.z += 0.005;
                    
                    if (node === autoFocusedMesh) {
                        node.material.color.setHex(node.userData.hoverColor);
                        node.material.opacity = 1.0;
                    } else {
                        node.material.color.setHex(node.userData.originalColor);
                        node.material.opacity = 0.8;
                    }
                });
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
