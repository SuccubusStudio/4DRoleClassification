<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4D 角色屬性矩陣 (Character Matrix)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 2rem; }
        
        /* 滑鼠懸停的提示框 */
        #tooltip {
            position: absolute;
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid #38bdf8;
            border-radius: 8px;
            padding: 12px 16px;
            color: #e0f2fe;
            font-size: 14px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3), 0 0 15px rgba(56, 189, 248, 0.3);
            transform: translate(-50%, -120%);
            backdrop-filter: blur(4px);
            white-space: nowrap;
            z-index: 100;
        }

        /* 返回按鈕 (4D 模式用) */
        #back-btn {
            pointer-events: auto;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.5);
        }
        #back-btn:hover {
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.8);
            transform: translate(-50%, -5px);
        }
        
        .axis-label {
            font-weight: bold;
            letter-spacing: 2px;
        }
    </style>
    
    <!-- 引入 Three.js 與 OrbitControls (使用 Import Map) -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <!-- UI 覆蓋層 -->
    <div id="ui-layer">
        <div>
            <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 mb-2">《Succubus Studio》角色屬性物理引擎 v2.0</h1>
            <p class="text-gray-400 text-sm">拖拽旋轉視角 | 滾輪縮放 | 滑鼠懸停查看 | <span class="text-cyan-400 font-bold animate-pulse">點擊球體展開第四維度！</span></p>
            
            <div class="mt-4 space-y-2 text-xs bg-gray-900/60 p-4 rounded-lg border border-gray-700 inline-block backdrop-blur-sm transition-opacity duration-300" id="legend-box">
                <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full" style="background-color: #ff66b2;"></div> 少女 (Y: 底層)</div>
                <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full" style="background-color: #ffb366;"></div> 少御 (Y: 中層)</div>
                <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full" style="background-color: #b266ff;"></div> 御姐 (Y: 頂層)</div>
            </div>
        </div>
        
        <div class="flex justify-between w-full text-xs font-mono text-gray-500 transition-opacity duration-300" id="axis-labels">
            <div>X 軸 (紅): 個性 (元氣 <-> 高冷)</div>
            <div>Y 軸 (綠): 成熟度 (少女 <-> 御姐)</div>
            <div>Z 軸 (藍): 危險度 (安全 <-> 危險)</div>
        </div>
    </div>

    <!-- 退出 4D 模式按鈕 -->
    <button id="back-btn" class="absolute bottom-10 left-1/2 transform -translate-x-1/2 bg-cyan-600 border border-cyan-400 text-white font-bold py-3 px-8 rounded-full opacity-0 pointer-events-none z-50 flex items-center gap-2">
        <span>← 收回第四維度</span>
    </button>

    <!-- 滑鼠懸停提示 -->
    <div id="tooltip">
        <div class="font-bold text-cyan-300 text-lg mb-1" id="tt-title">角色類型</div>
        <div class="text-gray-300" id="tt-desc">描述</div>
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 1. 初始化場景、相機、渲染器
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050505, 0.02); 

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(15, 12, 20); 

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 3, 0); 

        // 2. 燈光設置
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        const backLight = new THREE.DirectionalLight(0x4444ff, 0.8);
        backLight.position.set(-10, -10, -10);
        scene.add(backLight);

        // 3. 定義維度數據
        const dimX = [
            { id: -1, name: '元氣', colorMod: 0x22ff22 },
            { id: 0, name: '從容', colorMod: 0xffffff },
            { id: 1, name: '高冷', colorMod: 0x2222ff }
        ];
        const dimY = [
            { id: 0, name: '少女', color: 0xff66b2, size: 0.4, desc: '青澀、靈動，受動的觀察者' },
            { id: 1, name: '少御', color: 0xffb366, size: 0.5, desc: '幼態成熟，覺醒的跨越者' },
            { id: 2, name: '御姐', color: 0xb266ff, size: 0.6, desc: '絕對掌控，自覺的掌控者' }
        ];
        const dimZ = [
            { id: -1, name: '安全', descMod: '讓人想依賴的港灣' },
            { id: 0, name: '中立', descMod: '標準的性格展現' },
            { id: 1, name: '危險', descMod: '帶有侵略性或致命吸引力' }
        ];
        
        // 第四維度 (W軸: 決策軸 - 感性 vs 理性)
        const dimW = [
            { id: -1, name: '絕對感性', color: 0xff3366, descMod: '情感驅動，願意為了在乎的人事物打破所有規則。' },
            { id: 0, name: '感性與理智', color: 0x33ffcc, descMod: '在情感與現實間取得完美的平衡，最穩定的人格。' },
            { id: 1, name: '絕對理性', color: 0x3366ff, descMod: '冷酷精密，宛如機器般永遠計算著最優解。' }
        ];

        const spacing = 4; // 節點間距
        const nodeMeshes = [];
        const gridLines = []; // 儲存線條以便控制透明度
        
        // 用來集中管理主網格的群組
        const mainGridGroup = new THREE.Group();
        scene.add(mainGridGroup);

        const sphereGeo = new THREE.SphereGeometry(1, 32, 32);
        
        // 4. 生成 3x3x3 節點 (化學結構的球)
        dimX.forEach(x => {
            dimY.forEach(y => {
                dimZ.forEach(z => {
                    const posX = x.id * spacing;
                    const posY = y.id * spacing;
                    const posZ = z.id * spacing;

                    const material = new THREE.MeshStandardMaterial({ 
                        color: y.color,
                        metalness: 0.3,
                        roughness: 0.2,
                        emissive: y.color,
                        emissiveIntensity: 0.2,
                        transparent: true,
                        opacity: 0.9
                    });
                    
                    const sphere = new THREE.Mesh(sphereGeo, material);
                    sphere.scale.setScalar(y.size); 
                    sphere.position.set(posX, posY, posZ);
                    
                    const charName = `${z.name}的 ${x.name} ${y.name}`;
                    const charDesc = `【${y.name}】${y.desc}<br>【特質】${z.descMod}<br><span class="text-cyan-400 text-xs mt-1 block">▶ 點擊展開內心維度</span>`;
                    
                    sphere.userData = {
                        name: charName,
                        baseName: charName, // 乾淨的名字，供 4D 組合使用
                        desc: charDesc,
                        ix: x.id, iy: y.id, iz: z.id,
                        originalScale: y.size,
                        originalEmissive: y.color
                    };

                    mainGridGroup.add(sphere);
                    nodeMeshes.push(sphere);
                });
            });
        });

        // 5. 生成連結線
        const lineMaterial = new THREE.LineBasicMaterial({ color: 0x445566, transparent: true, opacity: 0.5 });
        for (let i = 0; i < nodeMeshes.length; i++) {
            for (let j = i + 1; j < nodeMeshes.length; j++) {
                const n1 = nodeMeshes[i].userData;
                const n2 = nodeMeshes[j].userData;
                const dist = Math.abs(n1.ix - n2.ix) + Math.abs(n1.iy - n2.iy) + Math.abs(n1.iz - n2.iz);
                if (dist === 1) {
                    const points = [nodeMeshes[i].position, nodeMeshes[j].position];
                    const geometry = new THREE.BufferGeometry().setFromPoints(points);
                    const line = new THREE.Line(geometry, lineMaterial);
                    mainGridGroup.add(line);
                    gridLines.push(line);
                }
            }
        }

        // 6. 添加座標軸指示器
        const axesHelper = new THREE.AxesHelper(10);
        mainGridGroup.add(axesHelper);

        // ==========================================
        // 7. 第四維度 (4D) 互動邏輯
        // ==========================================
        let is4DMode = false;
        let activeCenterMesh = null;
        let active4DGroup = null;
        let targetGridOpacity = 0.9;
        let currentGridOpacity = 0.9;
        let active4DNodes = [];

        const backBtn = document.getElementById('back-btn');
        const legendBox = document.getElementById('legend-box');
        const axisLabels = document.getElementById('axis-labels');

        // 展開第四維度
        function enter4DMode(baseMesh) {
            is4DMode = true;
            activeCenterMesh = baseMesh;
            targetGridOpacity = 0.35; // 讓主網格稍微變暗就好 (原本是 0.05，調亮以保留空間感)
            
            // 更新 UI
            backBtn.classList.remove('opacity-0', 'pointer-events-none');
            legendBox.style.opacity = '0';
            axisLabels.style.opacity = '0';

            // 創建 4D 群組
            active4DGroup = new THREE.Group();
            active4DGroup.position.copy(baseMesh.position); // 以點擊的球為中心
            scene.add(active4DGroup);

            // 4D 軸的方向 (我們讓它斜向衝出來)
            const dir = new THREE.Vector3(1, 0.5, 1).normalize();
            const wSpacing = 4; // W軸節點間距
            
            // 創建發光的光軸 (Cylinder)
            const tubeGeo = new THREE.CylinderGeometry(0.05, 0.05, wSpacing * 2, 8);
            tubeGeo.translate(0, wSpacing, 0); // 調整中心點
            const tubeMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending });
            const tube = new THREE.Mesh(tubeGeo, tubeMat);
            
            // 讓圓柱體對齊方向向量
            const quaternion = new THREE.Quaternion();
            quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
            tube.setRotationFromQuaternion(quaternion);
            // 將圓柱體移到起始點
            tube.position.copy(dir.clone().multiplyScalar(-wSpacing));
            active4DGroup.add(tube);

            // 創建 4D 節點 (用菱形/八面體來區別)
            const octaGeo = new THREE.OctahedronGeometry(0.8, 0);
            active4DNodes = [];

            dimW.forEach(w => {
                const pos = dir.clone().multiplyScalar(w.id * wSpacing);
                
                const wMat = new THREE.MeshStandardMaterial({
                    color: w.color,
                    metalness: 0.5,
                    roughness: 0.1,
                    emissive: w.color,
                    emissiveIntensity: 0.8,
                    transparent: true,
                    opacity: 0.9
                });
                
                const wNode = new THREE.Mesh(octaGeo, wMat);
                wNode.position.copy(pos);
                
                // 組合 4D 名字 (例如: 【絕對感性】的 危險的 元氣 御姐)
                wNode.userData = {
                    name: `<span style="color:#${w.color.toString(16).padStart(6, '0')}">【${w.name}】</span>的<br>${baseMesh.userData.baseName}`,
                    desc: `<span class="text-cyan-300">W軸：決策維度</span><br>${w.descMod}`,
                    originalScale: 1.0,
                    originalEmissive: w.color,
                    is4DNode: true
                };
                
                active4DGroup.add(wNode);
                active4DNodes.push(wNode);
            });

            // 動畫初始縮放為 0，營造「噗～」射出來的感覺
            active4DGroup.scale.set(0.001, 0.001, 0.001);
            
            // 將相機稍微拉近對焦
            controls.target.copy(baseMesh.position);
        }

        // 退出第四維度
        function exit4DMode() {
            is4DMode = false;
            activeCenterMesh = null;
            targetGridOpacity = 0.9;
            
            backBtn.classList.add('opacity-0', 'pointer-events-none');
            legendBox.style.opacity = '1';
            axisLabels.style.opacity = '1';

            if (active4DGroup) {
                scene.remove(active4DGroup);
                active4DGroup = null;
                active4DNodes = [];
            }
            
            // 恢復相機中心點
            controls.target.set(0, 3, 0);
            
            if (hoveredMesh) {
                tooltip.style.opacity = 0;
                hoveredMesh = null;
            }
        }

        backBtn.addEventListener('click', exit4DMode);

        // ==========================================
        // 8. 互動邏輯 (Raycaster)
        // ==========================================
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const tooltip = document.getElementById('tooltip');
        const ttTitle = document.getElementById('tt-title');
        const ttDesc = document.getElementById('tt-desc');
        let hoveredMesh = null;

        window.addEventListener('mousemove', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            tooltip.style.left = event.clientX + 'px';
            tooltip.style.top = event.clientY + 'px';
        });

        // 點擊事件
        window.addEventListener('click', (event) => {
            // 如果點擊到按鈕，不觸發 3D 點擊
            if(event.target.closest('#back-btn')) return;

            if (!is4DMode && hoveredMesh) {
                enter4DMode(hoveredMesh);
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ==========================================
        // 9. 動畫循環
        // ==========================================
        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            // 處理時空凝結 (暗化動畫)
            currentGridOpacity += (targetGridOpacity - currentGridOpacity) * 0.1;
            
            nodeMeshes.forEach(mesh => {
                if (mesh !== activeCenterMesh) {
                    mesh.material.opacity = currentGridOpacity;
                    mesh.material.emissiveIntensity = currentGridOpacity * 0.2;
                } else if (is4DMode) {
                    // 中心球體在 4D 模式下保持高亮
                    mesh.material.opacity = 0.9;
                    mesh.material.emissiveIntensity = 0.5;
                }
            });
            
            gridLines.forEach(line => {
                line.material.opacity = currentGridOpacity * 0.5;
            });
            axesHelper.material.opacity = currentGridOpacity;
            axesHelper.transparent = true;

            // 4D 軸射出動畫 (Scale lerp)
            if (is4DMode && active4DGroup) {
                active4DGroup.scale.lerp(new THREE.Vector3(1, 1, 1), 0.15);
                
                // 讓 4D 菱形稍微旋轉，增加神祕感
                active4DNodes.forEach(node => {
                    node.rotation.y += 0.02;
                    node.rotation.z += 0.01;
                });
            }

            // 處理光線投射 (滑鼠懸停效果)
            raycaster.setFromCamera(mouse, camera);
            
            // 決定射線要檢測的對象 (4D 模式下只檢測 4D 節點和中心點，普通模式檢測主網格)
            const intersectTargets = is4DMode ? [...active4DNodes, activeCenterMesh] : nodeMeshes;
            const intersects = raycaster.intersectObjects(intersectTargets);

            if (intersects.length > 0) {
                const object = intersects[0].object;
                
                if (hoveredMesh !== object) {
                    // 恢復之前的節點
                    if (hoveredMesh) {
                        hoveredMesh.scale.setScalar(hoveredMesh.userData.originalScale);
                        if (!is4DMode || hoveredMesh.userData.is4DNode) {
                            hoveredMesh.material.emissiveIntensity = hoveredMesh.userData.is4DNode ? 0.8 : 0.2;
                        }
                    }
                    
                    // 放大並高亮當前節點
                    hoveredMesh = object;
                    hoveredMesh.scale.setScalar(hoveredMesh.userData.originalScale * 1.5);
                    hoveredMesh.material.emissiveIntensity = hoveredMesh.userData.is4DNode ? 2.0 : 0.8;
                    
                    // 更新 UI
                    ttTitle.innerHTML = hoveredMesh.userData.name;
                    ttDesc.innerHTML = hoveredMesh.userData.desc;
                    tooltip.style.opacity = 1;
                    tooltip.style.borderColor = '#' + hoveredMesh.userData.originalEmissive.toString(16).padStart(6, '0');
                }
            } else {
                if (hoveredMesh) {
                    hoveredMesh.scale.setScalar(hoveredMesh.userData.originalScale);
                    if (!is4DMode || hoveredMesh.userData.is4DNode) {
                        hoveredMesh.material.emissiveIntensity = hoveredMesh.userData.is4DNode ? 0.8 : 0.2;
                    } else if (hoveredMesh === activeCenterMesh && is4DMode) {
                        hoveredMesh.material.emissiveIntensity = 0.5; // 中心點在 4D 模式下維持一定亮度
                    }
                    
                    hoveredMesh = null;
                    tooltip.style.opacity = 0;
                }
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
